<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Los Números Enteros | Eduquémonos con TICs</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    /* VARIABLES DE COLOR */
    :root {
      --azul-oscuro: #12284C;
      --azul-brillante: #1A3C6E;
      --verde-neon: #2ECC8A;
      --verde-hover: #25A870;
      --naranja-vibrante: #FF9F1C;
      --amarillo: #FFD166;
      --fondo: #F4F7F6;
      --texto: #2D2D2D;
      --blanco: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Open Sans', sans-serif; 
      background: var(--fondo); 
      color: var(--texto); 
      overflow: hidden; 
    }

    /* ------------------------------------- */
    /* 🎮 MODAL DE BIENVENIDA (GAMIFICACIÓN) */
    /* ------------------------------------- */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(26, 60, 110, 0.85);
        backdrop-filter: blur(5px);
        display: none; 
        align-items: center; justify-content: center;
        z-index: 9999;
        opacity: 0; transition: opacity 0.4s ease;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    
    .modal-content {
        background: var(--blanco);
        padding: 2.5rem 2rem;
        border-radius: 20px;
        width: 90%; max-width: 400px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border-top: 6px solid var(--verde-neon);
    }
    .modal-overlay.show .modal-content { transform: translateY(0); }
    
    .modal-icon { font-size: 3rem; margin-bottom: 10px; animation: bounce 2s infinite; }
    .modal-title { font-family: 'Nunito', sans-serif; font-weight: 900; color: var(--azul-oscuro); font-size: 1.5rem; margin-bottom: 10px; }
    .modal-text { color: #666; font-size: 0.95rem; margin-bottom: 20px; }
    
    .modal-input {
        width: 100%; padding: 12px 15px;
        border: 2px solid #e0e0e0; border-radius: 12px;
        font-family: 'Open Sans', sans-serif; font-size: 1rem;
        outline: none; transition: border-color 0.3s;
        text-align: center; margin-bottom: 20px;
    }
    .modal-input:focus { border-color: var(--verde-neon); }
    
    .modal-btn {
        background: var(--verde-neon); color: var(--azul-oscuro);
        font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem;
        padding: 12px 30px; border: none; border-radius: 30px;
        cursor: pointer; width: 100%;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .modal-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(46, 204, 138, 0.4);
    }
    
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    /* ------------------------------------- */
    /* 🎮 NAVBAR GAMIFICADO                  */
    /* ------------------------------------- */
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; 
      background: linear-gradient(90deg, var(--azul-oscuro) 0%, var(--azul-brillante) 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; height: 68px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      border-bottom: 3px solid var(--verde-neon);
      overflow: hidden;
    }

    .nav-top {
      display: flex; align-items: center; gap: 1.5rem; flex-shrink: 0;
    }

    .nav-brand { 
      display: flex; flex-direction: column; justify-content: center; 
      cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .nav-brand:hover { transform: scale(1.05) rotate(-1deg); }

    .nav-logo { 
      font-family: 'Nunito', sans-serif; font-weight: 900; 
      color: var(--blanco); font-size: 1.3rem; line-height: 1;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .nav-logo span { color: var(--amarillo); }

    .nav-sub { 
      display: inline-block; background: var(--naranja-vibrante); color: var(--blanco); 
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.65rem; 
      letter-spacing: 1px; padding: 2px 8px; border-radius: 12px; margin-top: 3px;
      text-transform: uppercase; box-shadow: 0 2px 5px rgba(255,159,28,0.4);
    }

    /* CONTADOR DE PUNTOS */
    .nav-puntos {
      background: rgba(255,255,255,0.1); border: 2px solid var(--verde-neon); 
      color: var(--blanco); font-family: 'Nunito', sans-serif; font-weight: 800; 
      padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; 
      display: none; align-items: center; gap: 5px; 
      box-shadow: 0 0 10px rgba(46, 204, 138, 0.3); transition: transform 0.3s ease; 
      white-space: nowrap;
    }

    .nav-links { 
      display: flex; gap: 0.6rem; list-style: none; 
      overflow-x: auto; white-space: nowrap; padding-bottom: 2px; scrollbar-width: none;
      margin-left: auto; padding-left: 1rem; justify-content: flex-end; flex-grow: 1;
    }
    .nav-links::-webkit-scrollbar { display: none; }

    .nav-links a {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: 'Nunito', sans-serif; font-weight: 700; color: var(--blanco);
      padding: 0.45rem 1rem; border-radius: 25px; font-size: 0.9rem; 
      cursor: pointer; text-decoration: none;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .nav-links a:hover { 
      background: rgba(255,255,255,0.2); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    }
    .nav-links a.active { 
      background: var(--verde-neon); color: var(--azul-oscuro); border-color: var(--verde-neon);
      box-shadow: 0 0 15px rgba(46, 204, 138, 0.6); transform: translateY(-2px);
    }
    .nav-icon { font-size: 1.1rem; }

    /* ------------------------------------- */
    /* 🚀 FOOTER DINÁMICO                    */
    /* ------------------------------------- */
    footer {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
      background: var(--azul-oscuro); color: rgba(255,255,255,0.8); text-align: center;
      padding: 8px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; height: 42px;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .footer-brand { 
      color: var(--verde-neon); font-weight: 800; cursor: pointer; 
      text-decoration: none; padding: 2px 8px; border-radius: 10px;
      transition: all 0.2s ease;
    }
    .footer-brand:hover { background: rgba(46, 204, 138, 0.15); text-shadow: 0 0 8px rgba(46, 204, 138, 0.6); }

    /* ------------------------------------- */
    /* 📺 CONTENEDOR DE PÁGINAS (IFRAMES)    */
    /* ------------------------------------- */
    .page { display: none; }
    .page.active { display: block; animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes slideUpFade { 
      from { opacity: 0; transform: translateY(15px) scale(0.99); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }

    .iframe-container {
      position: absolute; top: 68px; bottom: 42px; left: 0; right: 0; width: 100%;
      background: var(--fondo);
    }
    .iframe-container iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ==================================================== */
    /* 📱 RESPONSIVE (AJUSTES PARA CELULARES)               */
    /* ==================================================== */
    @media (max-width: 768px) {
      .navbar { 
        flex-direction: column; 
        height: auto; 
        padding: 10px 15px; 
        gap: 10px; 
        align-items: stretch;
      }
      .nav-top { 
        width: 100%; 
        justify-content: space-between; /* Logo a la izq, Puntos a la der */
        gap: 0;
      }
      .nav-links { 
        width: 100%; 
        justify-content: flex-start; 
        padding-left: 0; margin-left: 0; 
        padding-bottom: 5px;
        -webkit-overflow-scrolling: touch; /* Deslizamiento suave en iOS */
      }
      /* Al hacerse más alta la barra, bajamos un poco los iframes */
      .iframe-container { top: 110px; } 
    }
  </style>
</head>

<body>

<!-- HTML DEL MODAL DE BIENVENIDA -->
<div class="modal-overlay" id="welcomeModal">
    <div class="modal-content">
        <div class="modal-icon">🚀</div>
        <h2 class="modal-title">¡Bienvenido a la aventura!</h2>
        <p class="modal-text">Para guardar tu progreso y puntos, dinos cómo te llamas:</p>
        <input type="text" id="playerName" class="modal-input" placeholder="Tu nombre o apodo..." autocomplete="off">
        <button class="modal-btn" onclick="guardarNombre()">¡Empezar a jugar!</button>
    </div>
</div>

<nav class="navbar">
  <!-- CONTENEDOR IZQUIERDO: LOGO Y PUNTOS -->
  <div class="nav-top">
      <div class="nav-brand" onclick="showPage('inicio')">
        <div class="nav-logo">ℤ <span>Enteros</span></div>
        <div class="nav-sub">EDUQUÉMONOS CON TICS</div>
      </div>
      
      <!-- CONTADOR DE PUNTOS GLOBALES -->
      <div id="nav-puntos-globales" class="nav-puntos">
          <span style="font-size:1.1rem;">⭐</span> <span id="nav-puntos-numero">0</span> pts
      </div>
  </div>

  <!-- CONTENEDOR DERECHO: BOTONES DE NAVEGACIÓN -->
  <ul class="nav-links">
    <li><a id="nav-inicio" onclick="showPage('inicio')" class="active"><span class="nav-icon">🏠</span> Inicio</a></li>
    <li><a id="nav-teoria" onclick="showPage('teoria')"><span class="nav-icon">🧠</span> Teoría</a></li>
    <li><a id="nav-practica" onclick="showPage('practica')"><span class="nav-icon">🎮</span> Práctica</a></li>
    <li><a id="nav-evaluacion" onclick="showPage('evaluacion')"><span class="nav-icon">🏆</span> Evaluación</a></li>
    <li><a id="nav-recursos" onclick="showPage('recursos')"><span class="nav-icon">🎒</span> Recursos</a></li>
    <li><a id="nav-quienes-somos" onclick="showPage('quienes-somos')"><span class="nav-icon">🚀</span> Quiénes somos</a></li>
  </ul>
</nav>

<!-- PÁGINAS (VENTANAS INTERNAS) -->
<div id="page-inicio" class="page active">
  <div class="iframe-container"><iframe src="./inicio_numeros_enteros.html" title="Inicio"></iframe></div>
</div>

<div id="page-teoria" class="page">
  <div class="iframe-container"><iframe src="./teoria-2-2.html" title="Teoría"></iframe></div>
</div>

<div id="page-practica" class="page">
  <div class="iframe-container"><iframe src="./practica-3.html" title="Práctica"></iframe></div>
</div>

<div id="page-evaluacion" class="page">
  <div class="iframe-container"><iframe src="./evaluacion.html" title="Evaluación"></iframe></div>
</div>

<div id="page-recursos" class="page">
  <div class="iframe-container"><iframe src="./recursos.html" title="Recursos"></iframe></div>
</div>

<div id="page-quienes-somos" class="page">
  <div class="iframe-container"><iframe src="./quienes_somos.html" title="Quiénes somos"></iframe></div>
</div>

<!-- PIE DE PÁGINA -->
<footer>
  Diseñado con 💻 y 🍕 por <span class="footer-brand" onclick="showPage('quienes-somos')">EDUQUÉMONOS CON TICS</span>
</footer>

<!-- SCRIPTS -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        iniciarEstudiante();
        actualizarPuntosNav(); 
    });

    function iniciarEstudiante() {
        let estudiante = localStorage.getItem("edu_estudiante");
        if (!estudiante) {
            const modal = document.getElementById('welcomeModal');
            modal.classList.add('show');
            document.getElementById('playerName').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') guardarNombre();
            });
        } else {
            actualizarFooter(estudiante);
        }
    }

    function guardarNombre() {
        const input = document.getElementById('playerName');
        let nombre = input.value.trim();
        
        if (nombre === "") {
            input.style.transform = "translateX(-5px)";
            setTimeout(() => input.style.transform = "translateX(5px)", 100);
            setTimeout(() => input.style.transform = "translateX(0)", 200);
            input.style.borderColor = "#ff4d4d";
            return;
        }

        localStorage.setItem("edu_estudiante", nombre);
        localStorage.setItem("edu_progreso", JSON.stringify({
            teoriaVista: false,
            practicaPuntaje: 0,
            evaluacionAprobada: false
        }));

        const modal = document.getElementById('welcomeModal');
        modal.style.opacity = '0';
        setTimeout(() => {
            modal.classList.remove('show');
            modal.style.display = 'none';
        }, 400);

        actualizarFooter(nombre);
        actualizarPuntosNav();
        const iframeInicio = document.querySelector('#page-inicio iframe');
        if(iframeInicio) iframeInicio.src = iframeInicio.src;
    }

    function actualizarFooter(nombre) {
        const footer = document.querySelector("footer");
        footer.innerHTML = `¡Aprende a tu ritmo, <b>${nombre}</b>! <span onclick="resetearPerfil()" style="cursor:pointer; color:#ff4d4d; font-size:0.7rem; margin-left:5px; font-weight:bold;" title="Cambiar usuario">[Reset]</span> | Diseñado por <span class="footer-brand" onclick="showPage('quienes-somos')">EDUQUÉMONOS CON TICS</span>`;
    }

    function resetearPerfil() {
        if(confirm("¿Seguro que quieres borrar tu progreso y cambiar de nombre?")) {
            localStorage.removeItem("edu_estudiante");
            localStorage.removeItem("edu_progreso");
            location.reload(); 
        }
    }

    function actualizarPuntosNav() {
        let progresoText = localStorage.getItem("edu_progreso");
        if(progresoText) {
            let progreso = JSON.parse(progresoText);
            if(progreso.practicaPuntaje !== undefined) {
                const navPuntos = document.getElementById('nav-puntos-globales');
                const numPuntos = document.getElementById('nav-puntos-numero');
                if(navPuntos && numPuntos) {
                    navPuntos.style.display = 'flex';
                    numPuntos.textContent = progreso.practicaPuntaje;
                    
                    navPuntos.style.transform = 'scale(1.1)';
                    navPuntos.style.boxShadow = '0 0 20px rgba(46, 204, 138, 0.8)';
                    setTimeout(() => {
                        navPuntos.style.transform = 'scale(1)';
                        navPuntos.style.boxShadow = '0 0 10px rgba(46, 204, 138, 0.3)';
                    }, 400);
                }
            }
        }
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        
        const page = document.getElementById('page-' + id);
        if (page) page.classList.add('active');
        
        const nav = document.getElementById('nav-' + id);
        if (nav) {
            nav.classList.add('active');
            nav.style.transform = "scale(0.9)";
            setTimeout(() => { nav.style.transform = "translateY(-2px)"; }, 150);
        }
        
        if (nav && window.innerWidth < 768) {
            nav.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        if (id === 'evaluacion' || id === 'practica') {
            const iframe = document.querySelector('#page-' + id + ' iframe');
            if(iframe) iframe.src = iframe.src; 
        }
    }

    window.addEventListener('message', function(event) {
        if (event.data) {
            if (event.data.action === 'cambiarPagina') {
                showPage(event.data.destino);
            }
            if (event.data.action === 'actualizarPuntos' || event.data.action === 'evaluacionAprobada') {
                actualizarPuntosNav();
            }
        }
    });
</script>
</body>
</html>
